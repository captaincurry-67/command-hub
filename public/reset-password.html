<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | 5th Marine Regiment Command Hub</title>
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__brand">
      <img class="site-header__logo" src="assets/img/logo.png" alt="5th Marine Regiment crest" />
      5th Marine Regiment <span>Command Hub</span>
    </div>
  </header>

  <main class="page-shell">
    <div class="auth-shell">
      <div class="auth-card">
        <!-- Shown when there's no ?token= in the URL: request a reset link -->
        <div id="request-view">
          <h1 class="auth-card__title">Reset Password</h1>
          <p class="auth-card__subtitle">Enter your email and we'll send you a reset link.</p>
          <form id="request-form">
            <div class="auth-field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" autocomplete="email" required />
            </div>
            <button type="submit" class="auth-submit">Send Reset Link</button>
          </form>
        </div>

        <!-- Shown when a ?token= is present: set a new password -->
        <div id="confirm-view" style="display: none;">
          <h1 class="auth-card__title">Choose a New Password</h1>
          <form id="confirm-form">
            <div class="auth-field">
              <label for="new-password">New Password</label>
              <input type="password" id="new-password" name="newPassword" autocomplete="new-password" required minlength="8" />
            </div>
            <button type="submit" class="auth-submit">Set New Password</button>
          </form>
        </div>

        <div id="message" class="auth-message"></div>

        <p class="auth-links"><a href="login.html">Back to Login</a></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    5th Marine Regiment Command Hub
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/reset-password.js"></script>
</body>
</html>
