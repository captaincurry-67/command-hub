<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First-Time Setup | 5th Marine Regiment Command Hub</title>
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__brand">
      <img class="site-header__logo" src="assets/img/logo.png" alt="5th Marine Regiment crest" />
      5th Marine Regiment <span>Command Hub</span>
    </div>
  </header>

  <main class="page-shell">
    <div class="auth-shell">
      <div class="auth-card" id="setup-card">
        <h1 class="auth-card__title">First-Time Setup</h1>
        <p class="auth-card__subtitle">
          Create the first Regimental Command account. This page only works once —
          it disables itself as soon as any officer account exists.
        </p>

        <form id="setup-form">
          <div class="auth-field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required minlength="3" />
          </div>
          <div class="auth-field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" required minlength="8" />
          </div>
          <button type="submit" class="auth-submit">Create Account</button>
        </form>

        <div id="message" class="auth-message"></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    5th Marine Regiment Command Hub
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/setup.js"></script>
</body>
</html>
