<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | 5th Marine Regiment Command Hub</title>
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/auth.css" />
</head>
<body>
  <header class="site-header">
    <div class="site-header__brand">
      <img class="site-header__logo" src="assets/img/logo.png" alt="5th Marine Regiment crest" />
      5th Marine <span>Regiment Command Hub</span>
    </div>
  </header>

  <main class="page-shell">
    <div class="auth-shell">
      <div class="auth-card">
        <h1 class="auth-card__title">Officer Login</h1>
        <p class="auth-card__subtitle">Sign in with your Command Hub username and password.</p>

        <form id="login-form">
          <div class="auth-field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" autocomplete="username" required />
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />
          </div>
          <button type="submit" class="auth-submit">Log In</button>
        </form>

        <div id="message" class="auth-message"></div>

        <p class="auth-links"><a href="reset-password.html">Forgot your password?</a></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    5th Marine Regiment Command Hub &mdash; Discord Mil-Sim Community
  </footer>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
